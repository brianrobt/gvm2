name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches VERSION file
        run: |
          VERSION_FILE=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION_FILE" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match VERSION file ($VERSION_FILE)"
            exit 1
          fi
          echo "Version validated: $VERSION_FILE"

      - name: Extract changelog for this version
        id: changelog
        uses: ffurrer2/extract-release-notes@v2
        with:
          changelog_file: ChangeLog

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.release_notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
