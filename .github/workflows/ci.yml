name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.shell }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [bash, zsh]
    env:
      GVM_NO_GIT_BAK: "1"
      GVM_NO_UPDATE_PROFILE: "1"
      SRC_REPO: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        if: matrix.shell == 'zsh' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install Ruby and tf
        run: |
          gem install tf -v '>=0.4.1' --user-install
          echo "$(ruby -e 'print Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison curl git make binutils gcc build-essential

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bison || true

      - name: Install gvm2 locally
        run: |
          mkdir -p "$RUNNER_TEMP/gvm-dest"
          ./binscripts/gvm-installer "${{ github.sha }}" "$RUNNER_TEMP/gvm-dest"

      - name: Run comment tests
        env:
          GVM_SHELL: ${{ matrix.shell }}
        run: |
          $GVM_SHELL -c '
            set -e
            source "'"$RUNNER_TEMP"'/gvm-dest/gvm/scripts/gvm"
            tf --text "'"$RUNNER_TEMP"'/gvm-dest/gvm/tests/"*.sh
          '

      - name: Smoke — binary install, use, cd with spaces
        env:
          GVM_SHELL: ${{ matrix.shell }}
        run: |
          $GVM_SHELL -c '
            set -e
            source "'"$RUNNER_TEMP"'/gvm-dest/gvm/scripts/gvm"
            gvm install go1.22.12 -B
            gvm use go1.22.12
            go version | grep -E "go1\\.22\\.12"
            spaced="'"$RUNNER_TEMP"'/dir with spaces"
            mkdir -p "$spaced"
            cd "$spaced"
            pwd | grep "dir with spaces"
            test -n "$HEXDUMP_PATH"
            command -v "$HEXDUMP_PATH"
          '

  scenario:
    name: scenario / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GVM_NO_GIT_BAK: "1"
      GVM_NO_UPDATE_PROFILE: "1"
      SRC_REPO: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Ruby and tf
        run: |
          gem install tf -v '>=0.4.1' --user-install
          echo "$(ruby -e 'print Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison curl git make binutils gcc build-essential

      - name: Run scenario tests
        run: rake scenario
