name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    name: smoke / ${{ matrix.os }} / ${{ matrix.shell }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [bash, zsh]
    env:
      GVM_NO_GIT_BAK: "1"
      GVM_NO_UPDATE_PROFILE: "1"
      SRC_REPO: ${{ github.workspace }}
      TERM: xterm
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh (Linux)
        if: matrix.shell == 'zsh' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison curl git make binutils gcc build-essential

      - name: Install gvm2 locally
        id: install
        run: |
          DEST="$RUNNER_TEMP/gvm-dest"
          mkdir -p "$DEST"
          ./binscripts/gvm-installer "${{ github.sha }}" "$DEST"
          test -f "$DEST/gvm/VERSION"
          diff -q VERSION "$DEST/gvm/VERSION"
          echo "dest=$DEST" >> "$GITHUB_OUTPUT"
          ls -la "$DEST/gvm/scripts"

      - name: Smoke
        run: |
          DEST="${{ steps.install.outputs.dest }}"
          chmod +x scripts/ci-smoke.sh
          if [ "${{ matrix.shell }}" = "zsh" ]; then
            zsh scripts/ci-smoke.sh "$DEST"
          else
            bash scripts/ci-smoke.sh "$DEST"
          fi

  suite:
    name: suite / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GVM_NO_GIT_BAK: "1"
      GVM_NO_UPDATE_PROFILE: "1"
      SRC_REPO: ${{ github.workspace }}
      TERM: xterm
      TRAVIS_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison curl git make binutils gcc build-essential

      - name: Install Ruby gems
        run: |
          gem install tf -v '>=0.4.1' --user-install
          GEM_BIN="$(ruby -r rubygems -e 'print Gem.user_dir')/bin"
          echo "$GEM_BIN" >> "$GITHUB_PATH"
          echo "PATH=$GEM_BIN:$PATH" >> "$GITHUB_ENV"

      - name: Run rake default
        run: rake default

      - name: Run rake scenario
        run: rake scenario
