name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    name: smoke / ${{ matrix.os }} / ${{ matrix.shell }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [bash, zsh]
    env:
      GVM_NO_GIT_BAK: "1"
      GVM_NO_UPDATE_PROFILE: "1"
      SRC_REPO: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh (Linux)
        if: matrix.shell == 'zsh' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison curl git make binutils gcc build-essential

      - name: Install gvm2 locally
        run: |
          mkdir -p "$RUNNER_TEMP/gvm-dest"
          ./binscripts/gvm-installer "${{ github.sha }}" "$RUNNER_TEMP/gvm-dest"
          test -f "$RUNNER_TEMP/gvm-dest/gvm/VERSION"
          grep -q '1.1.0' "$RUNNER_TEMP/gvm-dest/gvm/VERSION"

      - name: Smoke script
        run: |
          cat > "$RUNNER_TEMP/smoke.sh" <<'SMOKE'
          set -e
          source "$GVM_DEST/gvm/scripts/gvm"
          echo "GVM_VERSION=$GVM_VERSION HEXDUMP_PATH=$HEXDUMP_PATH"
          test -n "$HEXDUMP_PATH"
          gvm install go1.22.12 -B
          gvm use go1.22.12
          go version | grep -E 'go1\.22\.12'
          gvm list --porcelain | grep -F 'go1.22.12'
          spaced="$GVM_DEST/dir with spaces"
          mkdir -p "$spaced"
          cd "$spaced"
          pwd | grep 'dir with spaces'
          echo SMOKE_OK
          SMOKE
          export GVM_DEST="$RUNNER_TEMP/gvm-dest"
          case "${{ matrix.shell }}" in
            bash) bash "$RUNNER_TEMP/smoke.sh" ;;
            zsh)  zsh "$RUNNER_TEMP/smoke.sh" ;;
          esac

  suite:
    name: suite / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GVM_NO_GIT_BAK: "1"
      GVM_NO_UPDATE_PROFILE: "1"
      SRC_REPO: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison curl git make binutils gcc build-essential

      - name: Install Ruby gems
        run: |
          gem install tf -v '>=0.4.1' --user-install
          GEM_BIN="$(ruby -e 'print Gem.user_dir')/bin"
          echo "$GEM_BIN" >> "$GITHUB_PATH"
          echo "GEM_BIN=$GEM_BIN" >> "$GITHUB_ENV"
          "$GEM_BIN/tf" --help >/dev/null

      - name: Run rake default
        run: |
          export PATH="${GEM_BIN}:$PATH"
          rake default

      - name: Run rake scenario
        run: |
          export PATH="${GEM_BIN}:$PATH"
          rake scenario
